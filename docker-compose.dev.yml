# DB_* must be set for variable substitution (not committed).
# From repo root: docker compose -f docker-compose.dev.yml --env-file backend/.env up -d
# Or copy backend/.env to ./.env here so Compose loads it automatically.
services:
  db:
    image: postgres:14
    container_name: audio_temka_db
    environment:
      POSTGRES_USER: ${DB_USER:?Set DB_USER — use backend/.env with --env-file}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:?Set DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"

volumes:
  postgres_data:
